name: Deploy Direct

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-direct-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'ltsj/Rin'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run check

      - name: Build client
        run: |
          cd client
          bun run build
          cd ..

      - name: Setup Wrangler
        uses: ./.github/actions/setup-wrangler
        with:
          mode: "dry-run"

      - name: Build server
        run: |
          mkdir -p ./dist/server
          bunx wrangler deploy --dry-run --outdir=dist/server

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ vars.WORKER_NAME || 'rin-server' }}
          DB_NAME: ${{ vars.DB_NAME || 'rin' }}
          NAME: ${{ vars.NAME || 'Rin' }}
          DESCRIPTION: ${{ vars.DESCRIPTION || 'A lightweight personal blogging system' }}
          AVATAR: ${{ vars.AVATAR || '' }}
          PAGE_SIZE: ${{ vars.PAGE_SIZE || '5' }}
          RSS_ENABLE: ${{ vars.RSS_ENABLE || 'false' }}
          S3_CACHE_FOLDER: ${{ vars.S3_CACHE_FOLDER || 'cache/' }}
          S3_FOLDER: ${{ vars.S3_FOLDER || 'images/' }}
          S3_REGION: ${{ vars.S3_REGION || 'auto' }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE || 'false' }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || '' }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT || '' }}
          S3_ACCESS_HOST: ${{ vars.S3_ACCESS_HOST || '' }}
          S3_BUCKET: ${{ vars.S3_BUCKET || '' }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID || '' }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY || '' }}
          RIN_GITHUB_CLIENT_ID: ${{ secrets.RIN_GITHUB_CLIENT_ID || '' }}
          RIN_GITHUB_CLIENT_SECRET: ${{ secrets.RIN_GITHUB_CLIENT_SECRET || '' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WEBHOOK_URL: ${{ vars.WEBHOOK_URL || '' }}
          RSS_TITLE: ${{ vars.RSS_TITLE || '' }}
          RSS_DESCRIPTION: ${{ vars.RSS_DESCRIPTION || '' }}
          CACHE_STORAGE_MODE: ${{ vars.CACHE_STORAGE_MODE || 'database' }}
        run: bun run deploy

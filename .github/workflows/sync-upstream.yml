name: Sync upstream and deploy

on:
  schedule:
    - cron: "11 */6 * * *"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Build and deploy even when upstream has no new commits
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'ltsj/Rin'
    runs-on: ubuntu-latest
    steps:
      - name: Merge upstream into main
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BEFORE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/merge-upstream" \
            -f branch=main \
            --jq '.message'

          AFTER_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')
          if [ "$BEFORE_SHA" != "$AFTER_SHA" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy updated version
        if: steps.sync.outputs.updated == 'true' || inputs.force_deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-direct.yml --ref main --repo "$GITHUB_REPOSITORY"
